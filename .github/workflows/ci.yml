# Web app: build + lint on push (all branches) and PRs to main.
# Job id `web` is the required ruleset check name on merge.
name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [main]
  # Uses workflow from main; helps when pull_request does not fire.
  pull_request_target:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # pull_request_target runs in base-repo context; safe for same-repo PRs only.
    if: github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Placeholders so Next build does not require real Supabase in CI.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_BASE_URL: https://placeholder.example.com
