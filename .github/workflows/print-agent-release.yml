name: Print agent release

on:
  push:
    tags:
      - 'print-agent-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Read version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == print-agent-v* ]]; then
            echo "version=${GITHUB_REF_NAME#print-agent-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(tr -d '\r\n' < apps/print-agent/VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify VERSION file matches tag
        if: startsWith(github.ref, 'refs/tags/print-agent-v')
        shell: bash
        run: |
          TAG_VER="${GITHUB_REF_NAME#print-agent-v}"
          FILE_VER="$(tr -d '\r\n' < apps/print-agent/VERSION)"
          if [[ "$TAG_VER" != "$FILE_VER" ]]; then
            echo "::error::Tag print-agent-v$TAG_VER does not match apps/print-agent/VERSION ($FILE_VER)"
            exit 1
          fi
          echo "Version OK: $TAG_VER"

      - name: Go test
        working-directory: apps/print-agent
        run: go test ./...
        run: choco install innosetup -y --no-progress

      - name: Locate ISCC
        id: iscc
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          )
          foreach ($c in $candidates) {
            if (Test-Path $c) {
              "path=$c" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
              Write-Host "Found ISCC: $c"
              exit 0
            }
          }
          Get-ChildItem -Path "${env:ProgramFiles(x86)}","${env:ProgramFiles}" -Filter ISCC.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 5 | Format-Table FullName
          throw 'ISCC.exe not found after Inno Setup install'

      - name: Build Windows exe and zip
        shell: pwsh
        working-directory: apps/print-agent
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = '${{ steps.ver.outputs.version }}'
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          New-Item -ItemType Directory -Force -Path dist/amd64 | Out-Null
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
          go build -ldflags "-s -w -X main.Version=$ver" -o dist/amd64/MesaPrintAgent.exe .
          if ($LASTEXITCODE -ne 0) { throw "go build failed (exit $LASTEXITCODE)" }
          if (-not (Test-Path dist/amd64/MesaPrintAgent.exe)) { throw 'MesaPrintAgent.exe missing' }
          Set-Content -Path dist/amd64/VERSION.txt -Value $ver -NoNewline
          Copy-Item installer/WINDOWS-README.txt dist/amd64/ -Force
          Compress-Archive -Path dist/amd64/* -DestinationPath dist/MesaPrintAgent-windows-amd64.zip -Force
          Get-ChildItem dist/amd64 | Format-Table Name, Length

      - name: Build Inno installer
        shell: pwsh
        working-directory: apps/print-agent
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = '${{ steps.ver.outputs.version }}'
          $iss = Join-Path (Get-Location) 'installer\mesa-print-agent.iss'
          $log = Join-Path (Get-Location) 'dist\iscc.log'
          & '${{ steps.iscc.outputs.path }}' "/DMyAppVersion=$ver" $iss 2>&1 | Tee-Object -FilePath $log
          if (Test-Path $log) { Get-Content $log }
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed (exit $LASTEXITCODE)" }
          if (-not (Test-Path dist/MesaPrintAgent-Setup-amd64.exe)) {
            Get-ChildItem dist -Recurse | Format-Table FullName, Length
            throw 'Missing dist/MesaPrintAgent-Setup-amd64.exe'
          }
          Get-ChildItem dist -File | Format-Table Name, Length

      - name: Write SHA256SUMS
        shell: pwsh
        working-directory: apps/print-agent
        run: |
          $ErrorActionPreference = 'Stop'
          $lines = Get-ChildItem dist -File | ForEach-Object {
            $h = Get-FileHash $_.FullName -Algorithm SHA256
            "$($h.Hash.ToLower())  $($_.Name)"
          }
          $lines | Set-Content dist/SHA256SUMS -Encoding ascii

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/print-agent-v')
        with:
          tag_name: ${{ github.ref_name }}
          name: Mesa Print Agent ${{ steps.ver.outputs.version }}
          body: |
            Windows print agent for Mesa (thermal LAN printers, TCP 9100).

            **Install (recommended, x64 PCs):** `MesaPrintAgent-Setup-amd64.exe`

            **Portable:** `MesaPrintAgent-windows-amd64.zip`

            Verify `SHA256SUMS`. Builds are not Authenticode-signed; see WINDOWS-README in the zip.
          files: |
            apps/print-agent/dist/MesaPrintAgent-Setup-amd64.exe
            apps/print-agent/dist/MesaPrintAgent-windows-amd64.zip
            apps/print-agent/dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mesa-print-agent-${{ steps.ver.outputs.version }}
          path: apps/print-agent/dist/

      - name: Upload dist on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mesa-print-agent-build-debug
          path: apps/print-agent/dist/
          if-no-files-found: ignore

  verify-release:
    needs: release
    if: startsWith(github.ref, 'refs/tags/print-agent-v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Assert GitHub Release has required assets
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            resp=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
            if echo "$resp" | grep -q '"assets"'; then
              names=$(echo "$resp" | python3 -c "import sys,json; d=json.load(sys.stdin); print('\n'.join(a['name'] for a in d.get('assets',[])))")
              echo "$names"
              for required in MesaPrintAgent-Setup-amd64.exe MesaPrintAgent-windows-amd64.zip SHA256SUMS; do
                echo "$names" | grep -qx "$required" || { echo "Missing asset: $required"; sleep 10; continue 2; }
              done
              echo "All required release assets present."
              exit 0
            fi
            echo "Waiting for release assets ($i/30)..."
            sleep 10
          done
          echo "::error::Release $TAG missing required assets after 5 minutes"
          exit 1
