# Open a PR to main when a feature branch is pushed (solo-dev convenience).
name: Open PR

on:
  push:
    # Long-lived / deploy branches: push only, never auto-open PR to main.
    branches-ignore: [main, staging]
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to open PR for
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { owner, repo } = context.repo;
            const head = `${owner}:${branch}`;

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              head,
              base: 'main',
              state: 'open',
            });
            if (existing.length > 0) {
              core.info(`PR already open: #${existing[0].number}`);
              return;
            }

            const { data: commit } = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: branch,
            });
            const title = (commit.commit.message || 'Update').split('\n')[0].slice(0, 256);

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: branch,
              base: 'main',
              body: [
                'Auto-opened when this branch was pushed.',
                '',
                'Merge manually after **Vercel** preview deployment succeeds.',
              ].join('\n'),
            });
            core.info(`Created PR #${pr.number}: ${pr.html_url}`);
