<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mesa Print Agent — Printer mapping</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f1419; color: #e8e6e3; margin: 0; min-height: 100vh; padding: 24px; }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 1.3rem; margin: 0 0 6px; color: #d4a853; }
    .sub { font-size: 13px; color: #9aa5b1; margin-bottom: 20px; line-height: 1.5; }
    .card { background: #1a222c; border: 1px solid #2d3a4a; border-radius: 16px; padding: 22px 20px; margin-bottom: 16px; }
    .status { font-size: 13px; color: #9aa5b1; line-height: 1.55; padding: 10px 12px; background: #0f1419; border-radius: 8px; margin-bottom: 16px; border: 1px solid #2d3a4a; }
    .status strong { color: #e8e6e3; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #d4a853; color: #0f1419; font-size: 15px; font-weight: 600; cursor: pointer; }
    button.secondary { background: transparent; border: 1px solid #2d3a4a; color: #9aa5b1; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .err { color: #f87171; font-size: 13px; min-height: 1.2em; margin-top: 8px; }
    .ok-msg { color: #4ade80; font-size: 13px; min-height: 1.2em; margin-top: 8px; }
    .hint { font-size: 12px; color: #9aa5b1; margin-bottom: 14px; line-height: 1.45; }
    .scan-bar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; padding: 10px 12px; background: #0f1419; border: 1px solid #2d3a4a; border-radius: 8px; }
    .scan-status { font-size: 13px; color: #e8e6e3; margin: 0; flex: 1; min-width: 200px; line-height: 1.45; }
    .scan-refresh { width: auto !important; padding: 8px 14px !important; font-size: 13px !important; }
    .warn { font-size: 12px; color: #fbbf24; margin-bottom: 12px; line-height: 1.45; }
    .hidden { display: none; }
    .stations { border-top: 1px solid #2d3a4a; margin-top: 8px; padding-top: 14px; }
    .station-row { margin-bottom: 12px; }
    .station-name { font-size: 14px; color: #e8e6e3; margin-bottom: 4px; }
    .station-sub { font-size: 11px; color: #9aa5b1; margin-bottom: 6px; }
    .section-title { font-size: 13px; color: #d4a853; margin: 0 0 8px; font-weight: 600; }
    select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #2d3a4a; background: #0f1419; color: #e8e6e3; font-size: 14px; margin-bottom: 10px; }
    .test-row { margin-top: 16px; padding-top: 14px; border-top: 1px solid #2d3a4a; }
    .test-row label { display: block; font-size: 12px; color: #9aa5b1; margin-bottom: 6px; }
    .footer { text-align: center; margin-top: 8px; }
    a.pair-link { color: #d4a853; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 id="pageTitle">Mesa Print Agent — Settings</h1>
    <p class="sub" id="pageSub">…</p>

    <div class="status" id="status">…</div>

    <div class="card hidden" id="gateCard">
      <p class="hint" id="gateBody">…</p>
      <a class="pair-link" id="gatePairLink" href="/pair">…</a>
    </div>

    <div class="card hidden" id="mainCard">
      <div class="scan-bar">
        <p class="scan-status" id="scanHint">…</p>
        <button type="button" id="scanBtn" class="secondary scan-refresh">…</button>
      </div>
      <p class="hint" id="stationsTitle">…</p>
      <p class="hint" id="stationsHint">…</p>
      <p class="warn hidden" id="stationsWarn"></p>
      <div class="stations" id="stations"></div>
      <button type="button" id="saveBtn">…</button>
      <p class="err" id="saveErr"></p>
      <p class="ok-msg" id="saveOk"></p>
      <div class="test-row">
        <p class="section-title" id="testOptionalTitle">…</p>
        <label for="testStation" id="testStationLabel">…</label>
        <select id="testStation"></select>
        <button type="button" id="testPrintBtn" class="secondary">…</button>
        <p class="err" id="testErr"></p>
        <p class="ok-msg" id="testSent"></p>
      </div>
    </div>

    <div class="footer">
      <button type="button" id="doneBtn" class="secondary">…</button>
    </div>
  </div>
  <script>
    (function () {
      var state = { paired: false, station_printers: {}, api_base: '' };
      var ui = {};
      var stations = [];
      var stationNamesById = {};
      var cache = { tcp: [], winspool: [] };
      var draftMappings = {};
      var scanning = false;
      var pageGen = 0;

      function t(key) { return (ui && ui[key]) ? ui[key] : key; }
      function fmt(key, val) { return t(key).replace('%s', val); }
      function fmtCount(key, n) { return t(key).replace('%d', String(n)); }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function applyLabels() {
        document.getElementById('pageTitle').textContent = t('configure_page_title');
        document.getElementById('pageSub').textContent = t('configure_page_sub');
        document.getElementById('gateBody').textContent = t('configure_gate_body');
        document.getElementById('gatePairLink').textContent = t('configure_gate_pair_btn');
        document.getElementById('scanBtn').textContent = t('scan_again');
        document.getElementById('stationsTitle').textContent = t('stations_title');
        document.getElementById('saveBtn').textContent = t('save_printers_btn');
        document.getElementById('testOptionalTitle').textContent = t('configure_test_optional');
        document.getElementById('testStationLabel').textContent = t('test_station_label');
        document.getElementById('testPrintBtn').textContent = t('test_print_btn');
        document.getElementById('doneBtn').textContent = t('done_btn');
        document.title = t('configure_page_title');
        updateScanHint();
      }

      function seedDraft() {
        draftMappings = {};
        Object.keys(state.station_printers || {}).forEach(function (sid) {
          var addr = state.station_printers[sid];
          if (sid && addr) draftMappings[sid] = addr;
        });
      }

      function mappedValue(sid) {
        if (Object.prototype.hasOwnProperty.call(draftMappings, sid)) {
          return draftMappings[sid] || '';
        }
        return (state.station_printers && state.station_printers[sid]) || '';
      }

      function stationsForRender() {
        var out = [];
        var seen = {};
        (stations || []).forEach(function (s) {
          var key = String(s && s.id || '').trim();
          if (!key || seen[key]) return;
          seen[key] = true;
          out.push(s);
        });
        Object.keys(state.station_printers || {}).forEach(function (sid) {
          var key = String(sid || '').trim();
          if (!key || seen[key]) return;
          seen[key] = true;
          out.push({ id: key });
        });
        return out;
      }

      function scanSummaryText() {
        var lan = (cache.tcp || []).length;
        var usb = (cache.winspool || []).length;
        if (lan === 0 && usb === 0) return t('scan_none');
        var parts = [];
        if (lan) parts.push(fmtCount('scan_lan_count', lan));
        if (usb) parts.push(fmtCount('scan_usb_count', usb));
        return fmt('scan_found', parts.join(' · '));
      }

      function updateScanHint() {
        var el = document.getElementById('scanHint');
        if (scanning) {
          el.textContent = t('scan_scanning');
        } else if (!cache.tcp.length && !cache.winspool.length) {
          el.textContent = t('configure_scan_prompt');
        } else {
          el.textContent = scanSummaryText();
        }
        document.getElementById('scanBtn').disabled = scanning;
        document.getElementById('saveBtn').disabled = scanning;
        document.getElementById('testPrintBtn').disabled = scanning;
      }

      function buildPairHref(pairPath) {
        var qs = window.location.search.replace(/^\?/, '');
        if (qs) return pairPath + '?' + qs;
        if (state.api_base) return pairPath + '?api=' + encodeURIComponent(state.api_base);
        return pairPath;
      }

      function renderStatus() {
        var el = document.getElementById('status');
        if (!state.paired) {
          el.innerHTML = t('status_not_paired');
          document.getElementById('gateCard').classList.remove('hidden');
          document.getElementById('mainCard').classList.add('hidden');
          return;
        }
        var tpl = t('status_paired');
        el.innerHTML = tpl
          .replace('%s', escapeHtml(state.api_base || 'Mesa'))
          .replace('%d', String(state.station_count || 0));
        document.getElementById('gateCard').classList.add('hidden');
        document.getElementById('mainCard').classList.remove('hidden');
      }

      function stationLabel(s) {
        var known = stationNamesById[s.id];
        if (known) {
          return known.name_en || known.name_pt || known.name_zh || known.id;
        }
        return s.name_en || s.name_pt || s.name_zh || s.id;
      }

      function printerDisplayName(p) {
        var addr = (p && p.addr) || '';
        if (addr.indexOf('tcp:') === 0) return fmt('printer_lan_label', addr.slice(4));
        if (addr.indexOf('winspool:') === 0) return addr.slice(9);
        return (p && p.label) || addr;
      }

      function fillSelect(selectEl, selected) {
        selectEl.innerHTML = '';
        var def = document.createElement('option');
        def.value = '';
        def.textContent = t('printer_not_mapped');
        selectEl.appendChild(def);

        function addGroup(label, list, emptyText) {
          var g = document.createElement('optgroup');
          g.label = label;
          if (!list.length) {
            var empty = document.createElement('option');
            empty.value = '';
            empty.disabled = true;
            empty.textContent = emptyText;
            g.appendChild(empty);
          } else {
            list.forEach(function (p) {
              var o = document.createElement('option');
              o.value = p.addr;
              o.textContent = printerDisplayName(p);
              if (selected && selected === p.addr) o.selected = true;
              g.appendChild(o);
            });
          }
          selectEl.appendChild(g);
        }

        addGroup(t('printer_group_lan'), cache.tcp || [], t('printer_none_lan'));
        addGroup(t('printer_group_windows'), cache.winspool || [], t('printer_none_windows'));

        if (selected) {
          var found = false;
          for (var i = 0; i < selectEl.options.length; i++) {
            if (selectEl.options[i].value === selected) found = true;
          }
          if (!found) {
            var orphan = document.createElement('option');
            orphan.value = selected;
            orphan.textContent = t('printer_saved_missing');
            orphan.selected = true;
            selectEl.insertBefore(orphan, selectEl.options[1] || null);
          }
        }
      }

      function renderStations() {
        var root = document.getElementById('stations');
        var visible = stationsForRender();
        root.innerHTML = '';
        if (!visible.length) {
          document.getElementById('stationsHint').textContent = t('stations_empty');
          return;
        }
        document.getElementById('stationsHint').textContent = stations.length
          ? t('stations_map_hint')
          : t('stations_saved_only');
        visible.forEach(function (s) {
          var row = document.createElement('div');
          row.className = 'station-row';
          row.dataset.stationId = s.id;
          var lab = document.createElement('div');
          lab.className = 'station-name';
          lab.textContent = stationLabel(s);
          var sub = document.createElement('div');
          sub.className = 'station-sub';
          if (s.name_en) sub.textContent = s.name_en;
          var sel = document.createElement('select');
          sel.className = 'station-printer';
          fillSelect(sel, mappedValue(s.id));
          row.appendChild(lab);
          if (sub.textContent) row.appendChild(sub);
          row.appendChild(sel);
          root.appendChild(row);
        });
        refreshTestSelect();
      }

      function collectMappings() {
        var out = {};
        document.querySelectorAll('.station-printer').forEach(function (sel) {
          var row = sel.closest('.station-row');
          if (!row) return;
          var sid = row.dataset.stationId;
          if (sid) draftMappings[sid] = sel.value;
          if (sid && sel.value) out[sid] = sel.value;
        });
        return out;
      }

      function refreshTestSelect() {
        var sel = document.getElementById('testStation');
        sel.innerHTML = '';
        var maps = collectMappings();
        var ids = Object.keys(maps);
        if (!ids.length) {
          var o = document.createElement('option');
          o.value = '';
          o.textContent = t('save_need_mapping');
          sel.appendChild(o);
          return;
        }
        ids.forEach(function (sid) {
          var o = document.createElement('option');
          o.value = sid;
          o.textContent = stationLabel({ id: sid });
          sel.appendChild(o);
        });
      }

      function fetchStations() {
        return fetch('/api/print-stations').then(function (r) {
          return r.text().then(function (txt) {
            var j = {};
            try { j = txt ? JSON.parse(txt) : {}; } catch (e) { j = { error: txt }; }
            return { ok: r.ok, j: j };
          });
        });
      }

      function applyStations(res) {
        if (!res.ok) {
          stations = [];
          stationNamesById = {};
          document.getElementById('stationsWarn').classList.remove('hidden');
          document.getElementById('stationsWarn').textContent = (res.j && res.j.error) || t('stations_load_failed');
          return;
        }
        stations = res.j.stations || [];
        stationNamesById = {};
        stations.forEach(function (s) {
          if (s && s.id) stationNamesById[s.id] = s;
        });
        document.getElementById('stationsWarn').classList.add('hidden');
      }

      function runScan() {
        if (scanning) return Promise.resolve();
        scanning = true;
        updateScanHint();
        return fetch('/api/printers?refresh=1')
          .then(function (r) {
            return r.json().then(function (j) {
              if (!r.ok) throw new Error((j && j.error) || 'scan');
              return j;
            });
          })
          .then(function (j) {
            cache.tcp = j.tcp || [];
            cache.winspool = j.winspool || [];
            document.querySelectorAll('.station-printer').forEach(function (sel) {
              fillSelect(sel, sel.value);
            });
          })
          .catch(function () {
            document.getElementById('scanHint').textContent = t('scan_load_failed');
          })
          .finally(function () {
            scanning = false;
            updateScanHint();
          });
      }

      function loadPage() {
        var gen = ++pageGen;
        document.getElementById('status').textContent = t('status_loading');
        return fetch('/api/configure-state')
          .then(function (r) {
            return r.json().then(function (j) {
              if (!r.ok) throw new Error((j && j.error) || 'state');
              return j;
            });
          })
          .then(function (j) {
            if (gen !== pageGen) return;
            state = j;
            ui = j.ui || {};
            seedDraft();
            var pairPath = j.pair_path || '/pair';
            var pairLink = document.getElementById('gatePairLink');
            pairLink.href = buildPairHref(pairPath);
            applyLabels();
            renderStatus();
            if (!state.paired) {
              var sp = new URLSearchParams(window.location.search);
              if (sp.get('code')) {
                window.location.replace(buildPairHref(pairPath));
                return;
              }
              return;
            }
            return fetchStations().then(function (res) {
              if (gen !== pageGen) return;
              applyStations(res);
              renderStations();
            });
          })
          .catch(function () {
            if (gen !== pageGen) return;
            document.getElementById('status').textContent = t('state_load_failed');
          });
      }

      document.getElementById('stations').addEventListener('change', function (e) {
        if (!e.target || !e.target.classList.contains('station-printer')) return;
        var row = e.target.closest('.station-row');
        if (row && row.dataset.stationId) {
          draftMappings[row.dataset.stationId] = e.target.value;
          refreshTestSelect();
        }
      });

      document.getElementById('scanBtn').addEventListener('click', runScan);

      document.getElementById('saveBtn').addEventListener('click', function () {
        var err = document.getElementById('saveErr');
        var ok = document.getElementById('saveOk');
        err.textContent = '';
        ok.textContent = '';
        var maps = collectMappings();
        if (!Object.keys(maps).length) {
          err.textContent = t('save_need_mapping');
          return;
        }
        document.getElementById('saveBtn').disabled = true;
        fetch('/api/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ station_printers: maps })
        })
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
          .then(function (res) {
            if (!res.ok) {
              err.textContent = res.j.error || t('save_failed');
              return;
            }
            state.station_printers = res.j.station_printers || maps;
            state.station_count = Object.keys(state.station_printers || {}).length;
            seedDraft();
            if (res.j.routing_sync === 'failed') {
              ok.textContent = fmt('save_routing_sync_failed', res.j.routing_sync_error || '');
            } else {
              ok.textContent = t('save_ok');
            }
            renderStatus();
            refreshTestSelect();
          })
          .catch(function () { err.textContent = t('pair_service_unreachable'); })
          .finally(function () {
            document.getElementById('saveBtn').disabled = scanning;
          });
      });

      document.getElementById('testPrintBtn').addEventListener('click', function () {
        var testErr = document.getElementById('testErr');
        var testSent = document.getElementById('testSent');
        testErr.textContent = '';
        testSent.textContent = '';
        var sid = document.getElementById('testStation').value;
        if (!sid) {
          testErr.textContent = t('save_need_mapping');
          return;
        }
        var maps = collectMappings();
        var printer = maps[sid] || mappedValue(sid) || '';
        fetch('/api/test-print', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ station_id: sid, printer: printer })
        })
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
          .then(function (res) {
            if (!res.ok) {
              testErr.textContent = res.j.error || t('test_failed');
              return;
            }
            testSent.textContent = t('test_sent');
          })
          .catch(function () { testErr.textContent = t('pair_service_unreachable'); });
      });

      document.getElementById('doneBtn').addEventListener('click', function () {
        fetch('/api/configure-done', { method: 'POST' }).finally(function () { window.close(); });
      });

      loadPage();
    })();
  </script>
</body>
</html>
