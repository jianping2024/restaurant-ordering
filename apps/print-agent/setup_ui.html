<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mesa Print Agent — 打印机</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f1419; color: #e8e6e3; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 520px; background: #1a222c; border: 1px solid #2d3a4a; border-radius: 16px; padding: 28px 24px; }
    h1 { font-size: 1.2rem; margin: 0 0 6px; color: #d4a853; }
    .sub { font-size: 13px; color: #9aa5b1; margin-bottom: 20px; line-height: 1.5; }
    label { display: block; font-size: 12px; color: #9aa5b1; margin-bottom: 6px; }
    select, input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #2d3a4a; background: #0f1419; color: #e8e6e3; font-size: 14px; margin-bottom: 14px; }
    .row { display: flex; gap: 8px; margin-bottom: 14px; }
    .row label { flex: 1; display: flex; align-items: center; gap: 8px; padding: 10px; border: 1px solid #2d3a4a; border-radius: 8px; cursor: pointer; font-size: 14px; color: #e8e6e3; }
    .row input { width: auto; margin: 0; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #d4a853; color: #0f1419; font-size: 15px; font-weight: 600; cursor: pointer; }
    button.secondary { background: transparent; border: 1px solid #2d3a4a; color: #9aa5b1; margin-top: 8px; }
    .err { color: #f87171; font-size: 13px; min-height: 1.2em; margin-top: 8px; }
    .ok { display: none; text-align: center; }
    .ok h2 { color: #4ade80; font-size: 1.1rem; }
    .hint { font-size: 11px; color: #9aa5b1; margin-top: -8px; margin-bottom: 14px; line-height: 1.45; }
    .hidden { display: none; }
    .stations { border-top: 1px solid #2d3a4a; margin-top: 8px; padding-top: 16px; }
    .stations h2 { font-size: 13px; color: #d4a853; margin: 0 0 8px; font-weight: 600; }
    .station-row { margin-bottom: 12px; }
    .station-row label { margin-bottom: 4px; }
    .station-name { font-size: 14px; color: #e8e6e3; }
    .station-sub { font-size: 11px; color: #9aa5b1; margin-bottom: 6px; }
    .warn { font-size: 12px; color: #fbbf24; margin-bottom: 12px; line-height: 1.45; }
  </style>
</head>
<body>
  <div class="card">
    <div id="formWrap">
      <h1>选择打印机</h1>
      <p class="sub">Mesa 已配对。请选择 <strong>网线</strong> 或 <strong>USB</strong> 连接方式，并为各出品档口指定打印机（仅一台时可全部选「同默认」）。</p>
      <div class="row">
        <label><input type="radio" name="kind" value="tcp" checked /> 网线 (LAN :9100)</label>
        <label><input type="radio" name="kind" value="winspool" /> USB (Windows 打印机)</label>
      </div>
      <label for="printer">默认打印机（小票 / 未指定档口）</label>
      <select id="printer"></select>
      <p class="hint" id="scanHint">正在扫描…</p>
      <button type="button" id="refreshBtn" class="secondary" style="width:auto;margin-bottom:14px">重新扫描</button>

      <div class="stations" id="stationsWrap">
        <h2>出品档口</h2>
        <p class="hint" id="stationsHint">正在从 Mesa 加载档口列表…</p>
        <p class="warn hidden" id="stationsWarn"></p>
        <div id="stations"></div>
      </div>

      <button type="button" id="saveBtn">保存并开始打印</button>
      <p class="err" id="err"></p>
    </div>
    <div id="ok" class="ok">
      <h2>已保存</h2>
      <p style="color:#9aa5b1;font-size:13px">打印机与档口映射已写入配置。可关闭本页，代理窗口请保持运行。</p>
      <p style="color:#9aa5b1;font-size:12px;margin-top:10px">日后重新配对或改档口映射：运行 <strong>MesaPrintAgent.exe configure</strong></p>
    </div>
  </div>
  <script>
    (function () {
      var kindRadios = document.querySelectorAll('input[name="kind"]');
      var sel = document.getElementById('printer');
      var err = document.getElementById('err');
      var hint = document.getElementById('scanHint');
      var stationsHint = document.getElementById('stationsHint');
      var stationsWarn = document.getElementById('stationsWarn');
      var stationsEl = document.getElementById('stations');
      var cache = { tcp: [], winspool: [] };
      var stations = [];
      var saved = { default_printer: '', station_printers: {} };

      function currentKind() {
        var k = 'tcp';
        kindRadios.forEach(function (r) { if (r.checked) k = r.value; });
        return k;
      }

      function allPrinterOptions() {
        var out = [];
        (cache.tcp || []).forEach(function (p) { out.push(p); });
        (cache.winspool || []).forEach(function (p) { out.push(p); });
        return out;
      }

      function stationLabel(s) {
        if (s.name_zh) return s.name_zh + ' · ' + s.name_pt;
        return s.name_pt || s.name_en || s.id;
      }

      function fillSelect(selectEl, kind, selected) {
        var list = cache[kind] || [];
        selectEl.innerHTML = '';
        if (!list.length) {
          var o = document.createElement('option');
          o.value = '';
          o.textContent = kind === 'tcp' ? '（未发现网口打印机）' : '（未发现 Windows 打印机）';
          selectEl.appendChild(o);
          return;
        }
        list.forEach(function (p) {
          var o = document.createElement('option');
          o.value = p.addr;
          o.textContent = p.label || p.addr;
          if (selected && selected === p.addr) o.selected = true;
          selectEl.appendChild(o);
        });
      }

      function fillStationSelect(selectEl, selected) {
        selectEl.innerHTML = '';
        var def = document.createElement('option');
        def.value = '';
        def.textContent = '同默认打印机';
        selectEl.appendChild(def);
        allPrinterOptions().forEach(function (p) {
          var o = document.createElement('option');
          o.value = p.addr;
          o.textContent = p.label || p.addr;
          if (selected && selected === p.addr) o.selected = true;
          selectEl.appendChild(o);
        });
      }

      function renderStations() {
        stationsEl.innerHTML = '';
        if (!stations.length) {
          stationsHint.textContent = '后台暂无出品档口。可在 Mesa「出品档口」页添加；出品联将使用默认打印机。';
          return;
        }
        stationsHint.textContent = '为每个档口选择打印机。只有一台时可保持「同默认」。';
        stations.forEach(function (s) {
          var row = document.createElement('div');
          row.className = 'station-row';
          row.dataset.stationId = s.id;
          var sub = document.createElement('div');
          sub.className = 'station-sub';
          sub.textContent = s.name_en ? s.name_en : '';
          var lab = document.createElement('label');
          lab.className = 'station-name';
          lab.textContent = stationLabel(s);
          var stationSel = document.createElement('select');
          stationSel.className = 'station-printer';
          var mapped = (saved.station_printers && saved.station_printers[s.id]) || '';
          fillStationSelect(stationSel, mapped);
          row.appendChild(lab);
          if (sub.textContent) row.appendChild(sub);
          row.appendChild(stationSel);
          stationsEl.appendChild(row);
        });
      }

      function refreshStationSelects() {
        document.querySelectorAll('.station-printer').forEach(function (el) {
          var prev = el.value;
          fillStationSelect(el, prev);
        });
      }

      function loadList() {
        err.textContent = '';
        hint.textContent = '正在扫描…';
        fetch('/api/printers')
          .then(function (r) { return r.json(); })
          .then(function (j) {
            cache.tcp = j.tcp || [];
            cache.winspool = j.winspool || [];
            hint.textContent = '网线: ' + cache.tcp.length + ' 台 · USB 队列: ' + cache.winspool.length + ' 个';
            fillSelect(sel, currentKind(), saved.default_printer);
            refreshStationSelects();
          })
          .catch(function () {
            err.textContent = '无法加载打印机列表';
            hint.textContent = '';
          });
      }

      function loadStations() {
        fetch('/api/print-stations')
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
          .then(function (res) {
            if (!res.ok) {
              stationsWarn.classList.remove('hidden');
              stationsWarn.textContent = '无法从 Mesa 加载档口（请确认网站已更新）。出品联将使用默认打印机。';
              stations = [];
              renderStations();
              return;
            }
            stations = res.j.stations || [];
            renderStations();
          })
          .catch(function () {
            stationsWarn.classList.remove('hidden');
            stationsWarn.textContent = '无法连接 Mesa 加载档口。出品联将使用默认打印机。';
            stations = [];
            renderStations();
          });
      }

      function loadSaved() {
        fetch('/api/setup-state')
          .then(function (r) { return r.json(); })
          .then(function (j) {
            saved.default_printer = j.default_printer || '';
            saved.station_printers = j.station_printers || {};
            if (saved.default_printer.indexOf('winspool:') === 0) {
              kindRadios.forEach(function (r) { r.checked = r.value === 'winspool'; });
            } else if (saved.default_printer.indexOf('tcp:') === 0) {
              kindRadios.forEach(function (r) { r.checked = r.value === 'tcp'; });
            }
          })
          .catch(function () {})
          .finally(function () {
            loadList();
            loadStations();
          });
      }

      kindRadios.forEach(function (r) {
        r.addEventListener('change', function () { fillSelect(sel, currentKind(), sel.value); });
      });
      document.getElementById('refreshBtn').addEventListener('click', loadList);
      document.getElementById('saveBtn').addEventListener('click', function () {
        err.textContent = '';
        var target = sel.value;
        if (!target) {
          err.textContent = '请选择一台默认打印机';
          return;
        }
        var station_printers = {};
        document.querySelectorAll('.station-row').forEach(function (row) {
          var sid = row.dataset.stationId;
          var addr = row.querySelector('.station-printer').value;
          if (sid && addr) station_printers[sid] = addr;
        });
        fetch('/api/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ default_printer: target, station_printers: station_printers })
        })
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
          .then(function (res) {
            if (!res.ok) {
              err.textContent = res.j.error || '保存失败';
              return;
            }
            document.getElementById('formWrap').classList.add('hidden');
            document.getElementById('ok').style.display = 'block';
            setTimeout(function () { fetch('/api/setup-done', { method: 'POST' }); }, 800);
          })
          .catch(function () { err.textContent = '无法连接本机设置服务'; });
      });
      loadSaved();
    })();
  </script>
</body>
</html>
