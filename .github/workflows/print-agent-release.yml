name: Print agent release

on:
  push:
    tags:
      - 'print-agent-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Read version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == print-agent-v* ]]; then
            echo "version=${GITHUB_REF_NAME#print-agent-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(tr -d '\r\n' < apps/print-agent/VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installers and zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./apps/print-agent/scripts/build-release.ps1 -Version "${{ steps.ver.outputs.version }}" -Amd64Only
          if (-not (Test-Path apps/print-agent/dist/MesaPrintAgent-Setup-amd64.exe)) {
            throw 'Missing MesaPrintAgent-Setup-amd64.exe'
          }

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/print-agent-v')
        with:
          tag_name: ${{ github.ref_name }}
          name: Mesa Print Agent ${{ steps.ver.outputs.version }}
          body: |
            Windows print agent for Mesa (thermal LAN printers, TCP 9100).

            **Install (recommended, x64 PCs):** `MesaPrintAgent-Setup-amd64.exe`

            **Portable:** `MesaPrintAgent-windows-amd64.zip`

            **ARM64 Windows:** use `*-arm64` assets.

            Verify `SHA256SUMS`. Builds are not Authenticode-signed; see WINDOWS-README in the zip.
          files: |
            apps/print-agent/dist/MesaPrintAgent-Setup-amd64.exe
            apps/print-agent/dist/MesaPrintAgent-windows-amd64.zip
            apps/print-agent/dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mesa-print-agent-${{ steps.ver.outputs.version }}
          path: apps/print-agent/dist/
