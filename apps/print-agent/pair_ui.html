<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mesa Print Agent — 配对</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0f1419;
      color: #e8e6e3;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #1a222c;
      border: 1px solid #2d3a4a;
      border-radius: 16px;
      padding: 28px 24px;
    }
    h1 { font-size: 1.25rem; margin: 0 0 6px; color: #d4a853; }
    .sub { font-size: 13px; color: #9aa5b1; margin: 0 0 20px; line-height: 1.5; }
    label { display: block; font-size: 12px; color: #9aa5b1; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #2d3a4a;
      background: #0f1419;
      color: #e8e6e3;
      font-size: 15px;
      margin-bottom: 16px;
    }
    input.code { font-size: 28px; letter-spacing: 0.35em; text-align: center; font-family: ui-monospace, monospace; }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #d4a853;
      color: #0f1419;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .err { color: #f87171; font-size: 13px; margin-top: 12px; min-height: 1.2em; }
    .ok {
      display: none;
      text-align: center;
      padding: 8px 0;
    }
    .ok h2 { color: #4ade80; font-size: 1.1rem; margin: 0 0 12px; }
    .ok p { font-size: 13px; color: #9aa5b1; line-height: 1.55; }
    .form-wrap.hidden { display: none; }
    .steps { font-size: 12px; color: #9aa5b1; margin-bottom: 20px; padding-left: 1.2em; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div id="formWrap" class="form-wrap">
      <h1>Mesa 打印助手配对</h1>
      <p class="sub">在 Mesa 后台「打印助手」生成 6 位配对码后，在此填写并连接。无需命令行。</p>
      <ol class="steps">
        <li>登录 Mesa → 设置 → 打印助手 → 生成配对码</li>
        <li>填写下方 Mesa 网址（已自动填入时可检查）</li>
        <li>输入 6 位配对码并点击连接</li>
      </ol>
      <form id="pairForm">
        <label for="api">Mesa 网址</label>
        <input id="api" name="api" type="url" required placeholder="https://your-app.vercel.app" autocomplete="url" />
        <label for="code">配对码（6 位数字）</label>
        <input id="code" name="code" class="code" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" minlength="6" required placeholder="000000" autocomplete="one-time-code" />
        <button type="submit" id="submitBtn">连接并保存</button>
        <p class="err" id="err"></p>
      </form>
    </div>
    <div id="ok" class="ok">
      <h2>配对成功</h2>
      <p>配置已保存。请保持本窗口旁的 <strong>Mesa Print Agent</strong> 程序运行以自动打印。</p>
      <p style="margin-top:12px">下一步：在程序目录运行 <code>discover</code> 扫描打印机，或编辑配置文件中的打印机地址（见说明文档）。</p>
      <p style="margin-top:12px;font-size:12px">可关闭此浏览器标签页。</p>
    </div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var apiEl = document.getElementById('api');
      var codeEl = document.getElementById('code');
      if (params.get('api')) apiEl.value = params.get('api');
      if (params.get('code')) codeEl.value = params.get('code').replace(/\D/g, '').slice(0, 6);
      document.getElementById('pairForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var err = document.getElementById('err');
        var btn = document.getElementById('submitBtn');
        err.textContent = '';
        btn.disabled = true;
        fetch('/api/pair', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            api_base: apiEl.value.trim(),
            code: codeEl.value.trim()
          })
        })
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
          .then(function (res) {
            if (!res.ok) {
              err.textContent = res.j.error || '配对失败';
              btn.disabled = false;
              return;
            }
            document.getElementById('formWrap').classList.add('hidden');
            document.getElementById('ok').style.display = 'block';
          })
          .catch(function () {
            err.textContent = '无法连接本机配对服务，请确认 Mesa Print Agent 正在运行。';
            btn.disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
